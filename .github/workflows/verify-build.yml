name: Verify Build

on:
  workflow_call:
    inputs:
      actions-repo:
        type: string
        default: 'nubificus/vaccel'
      actions-ref:
        type: string
        default: 'main'
      strict:
        type: boolean
        default: false
      deploy:
        type: boolean
        default: false
      external-payload:
        type: string
        required: false
    secrets:
      VACCEL_BOT_PRIVATE_KEY:
        required: false

permissions: read-all

jobs:
  verify-build:
    name: Verify Build
    runs-on: base-dind-2204-amd64
    steps:
      - name: Checkout .gitmodules
        uses: actions/checkout@v6
        with:
          sparse-checkout: .gitmodules

      - name: Parse repository names
        id: parse-repos
        env:
          ACTIONS_REPO: ${{ inputs.actions-repo }}
        run: |
          submodule_names=$(git config --file .gitmodules \
            --get-regexp '\.url$' |
            awk -F'/' '{sub(/\.git$/, "", $NF); print $NF}')

          {
            echo "repo-name=$(basename "$GITHUB_REPOSITORY")"
            echo "actions-repo-name=$(basename "$ACTIONS_REPO")"
            echo 'submodule-names<<EOF'
            echo "$submodule_names"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate initialization vaccel-bot token
        id: generate-init-token
        if: vars.VACCEL_BOT_CLIENT_ID
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ steps.parse-repos.outputs.repo-name }}
            ${{ steps.parse-repos.outputs.actions-repo-name }}
            ${{ steps.parse-repos.outputs.submodule-names }}
          permission-contents: read

      - name: Checkout remote .github directory
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          repository: ${{ inputs.actions-repo }}
          ref: ${{ inputs.actions-ref }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Initialize workspace
        uses: ./.github/actions/initialize-workspace
        with:
          remote-actions-repo: ${{ inputs.actions-repo }}
          fetch-depth: 0
          submodules: 'true'
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Parse external payload
        id: parse-payload
        if: inputs.external-payload
        env:
          EXTERNAL_PAYLOAD: ${{ inputs.external-payload }}
        run: |
          trigger_id=$(jq -r '.["trigger-id"]' <<< "$EXTERNAL_PAYLOAD")
          repo=$(jq -r '.["repo"]' <<< "$EXTERNAL_PAYLOAD")
          ref=$(jq -r '.["ref"]' <<< "$EXTERNAL_PAYLOAD")
          branch=$(jq -r '.["branch"]' <<< "$EXTERNAL_PAYLOAD")
          deploy=$(jq -r '.["deploy"]' <<< "$EXTERNAL_PAYLOAD")
          run_url="https://github.com/${repo}/actions/runs/${trigger_id}"

          {
            echo "## Client request info"
            echo "Triggered by **${repo}** run [#${trigger_id}](${run_url})"
          }  >> "$GITHUB_STEP_SUMMARY"

          echo "Parsing payload from run: ${run_url}"
          echo "trigger-id=${trigger_id}" | tee -a "$GITHUB_OUTPUT"
          echo "ref=${ref}" | tee -a "$GITHUB_OUTPUT"
          echo "branch=${branch}" | tee -a "$GITHUB_OUTPUT"
          echo "repo=${repo}" | tee -a "$GITHUB_OUTPUT"
          echo "deploy=${deploy}" | tee -a "$GITHUB_OUTPUT"
        shell: bash

      - name: "Fetch submodule for ${{ steps.parse-payload.outputs.repo }}"
        id: fetch-submodule
        if: inputs.external-payload
        env:
          REPO: ${{ steps.parse-payload.outputs.repo }}
          REF: ${{ steps.parse-payload.outputs.ref }}
        run: |
          git submodule foreach "
            url=\$(git config --file \${toplevel}/.gitmodules \
              submodule.\${name}.url)
            if [ \"\${url#*\"$REPO\"}\" != \"\$url\" ]; then
              echo \"  Updating ${REPO} to ${REF}\"
              git checkout \"$REF\"
              echo \"sm-name=\${name}\" >> \"$GITHUB_OUTPUT\"
              echo \"sm-path=\${path}\" >> \"$GITHUB_OUTPUT\"
              break
            else
              echo '  Nothing to update'
            fi
          "
        shell: bash

      - name: Build docs
        uses: ./.github/actions/build-docs
        with:
          strict: ${{ inputs.strict }}
          deploy-version: >-
            ${{ inputs.deploy == true
              && (contains(github.ref, 'refs/tags/')
                && github.ref_name || 'main')
              || '' }}
          deploy-alias: >-
            ${{ inputs.deploy == true
              && (contains(github.ref, 'refs/tags/')
                && 'latest' || 'dev')
              || '' }}

      - name: Generate PR vaccel-bot token
        id: generate-pr-token
        if: steps.parse-payload.outputs.deploy == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: ${{ steps.parse-repos.outputs.repo-name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Get vaccel-bot info
        id: get-bot-info
        if: steps.parse-payload.outputs.deploy == 'true'
        uses: ./.github/actions/get-github-app-info
        with:
          app-slug: ${{ steps.generate-pr-token.outputs.app-slug }}

      - name: Create pull request
        id: create-pr
        if: steps.parse-payload.outputs.deploy == 'true'
        uses: peter-evans/create-pull-request@v8
        env:
          SM_NAME: ${{ steps.fetch-submodule.outputs.sm-name }}
          SM_REF: ${{ steps.parse-payload.outputs.ref }}
          SM_BRANCH: ${{ steps.parse-payload.outputs.branch }}
          SM_REPO: ${{ steps.parse-payload.outputs.repo }}
          BOT_NAME: ${{ steps.get-bot-info.outputs.user-login }}
          BOT_EMAIL: ${{ steps.get-bot-info.outputs.user-email }}
        with:
          token: ${{ steps.generate-pr-token.outputs.token }}
          commit-message: |
            chore(${{ env.SM_NAME }}): Update submodule revision

            Update submodule `${{ env.SM_NAME }}` to revision
            ${{ env.SM_REPO }}@${{ env.SM_REF }}
          committer: "${{ env.BOT_NAME }} <${{ env.BOT_EMAIL }}>"
          sign-commits: true
          signoff: true
          base: ${{ github.event.repository.default_branch }}
          branch: "update_${{ env.SM_NAME }}_${{ env.SM_BRANCH }}"
          delete-branch: true
          title: "chore(${{ env.SM_NAME }}): Update submodule revision"
          body: >-
            Update submodule `${{ env.SM_NAME }}` to revision
            ${{ env.SM_REPO }}@${{ env.SM_REF }}
          add-paths: ${{ env.SM_NAME }}

      - name: Print Pull Request info
        if: >-
          steps.parse-payload.outputs.deploy == 'true' &&
          steps.create-pr.outputs.pull-request-operation != 'none'
        env:
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
          PR_OPERATION: ${{ steps.create-pr.outputs.pull-request-operation }}
          PR_HEAD_SHA: ${{ steps.create-pr.outputs.pull-request-head-sha }}
          PR_BRANCH: ${{ steps.create-pr.outputs.pull-request-branch }}
        run: |
          {
            echo "## Pull request info"
            echo "${PR_OPERATION^} PR [${GITHUB_REPOSITORY}#${PR_NUMBER}](${PR_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Pull request number: ${PR_NUMBER}"
          echo "Pull request URL: ${PR_URL}"
          echo "Pull request operation: ${PR_OPERATION}"
          echo "Pull request head SHA: ${PR_HEAD_SHA}"
          echo "Pull request branch: ${PR_BRANCH}"
        shell: bash
