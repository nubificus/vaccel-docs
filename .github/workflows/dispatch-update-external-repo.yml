name: Update External Repo
run-name: >-
  ${{ format('Update External Repo · {0}',
    github.event_name == 'workflow_dispatch'
    && github.event.inputs.repository
    || github.event.client_payload.repository) }}

on:
  workflow_dispatch:
    inputs:
      trigger-id:
        type: string
        required: true
      ref:
        type: string
        required: true
      branch:
        type: string
        required: true
      repository:
        type: string
        required: true
      deploy:
        type: boolean
        default: false
  repository_dispatch:
    types: [update-external-repo]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  update-repo:
    name: Update Repo
    uses: ./.github/workflows/verify-build.yml
    with:
      external-payload: >-
        ${{ github.event_name == 'workflow_dispatch' &&
          toJson(github.event.inputs) ||
          toJson(github.event.client_payload) }}
    secrets: inherit

  update-repo-strict:
    name: Update Repo (Strict)
    if: >-
      !fromJson((github.event.inputs.deploy ||
        github.event.client_payload.deploy ||
        'false'))
    uses: ./.github/workflows/verify-build.yml
    with:
      external-payload: >-
        ${{ github.event_name == 'workflow_dispatch' &&
          toJson(github.event.inputs) ||
          toJson(github.event.client_payload) }}
      strict: true
    secrets: inherit
