name: Build and Verify

on:
  pull_request:
    branches: ["main"]
    types: [synchronize, labeled]

  workflow_dispatch:

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  check-pr-status:
    name: Check PR status
    uses: nubificus/vaccel/.github/workflows/check-pr-status.yml@main
    secrets: inherit

  verify-build:
    needs: check-pr-status
    name: Verify Build
    if: needs.check-pr-status.outputs.expects-checks == 'true'
    uses: ./.github/workflows/verify-build.yml
    secrets: inherit

  verify-build-strict:
    needs: check-pr-status
    name: Verify Build (Strict)
    if: needs.check-pr-status.outputs.expects-checks == 'true'
    uses: ./.github/workflows/verify-build.yml
    with:
      strict: true
    secrets: inherit

  verify-links:
    needs: check-pr-status
    name: Verify Links
    if: needs.check-pr-status.outputs.expects-checks == 'true'
    uses: ./.github/workflows/verify-links.yml
    secrets: inherit

  validate-files-and-commits:
    needs: check-pr-status
    name: Validate Files and Commits
    if: needs.check-pr-status.outputs.expects-checks == 'true'
    uses: nubificus/vaccel/.github/workflows/validate-files-and-commits.yml@main
    secrets: inherit

  validate-code-and-markdown:
    needs: check-pr-status
    name: Validate Code and Markdown
    if: needs.check-pr-status.outputs.expects-checks == 'true'
    uses: ./.github/workflows/validate-code-and-markdown.yml
    secrets: inherit

  # Dummy job for setting required checks
  jobs-completed:
    needs:
      - check-pr-status
      - verify-build
      - verify-build-strict
      - verify-links
      - validate-files-and-commits
      - validate-code-and-markdown
    name: Jobs Completed
    if: >-
      always() &&
      (needs.check-pr-status.outputs.is-approved == 'true' ||
        (needs.check-pr-status.outputs.expects-checks == 'true' &&
          !contains(needs.*.result, 'failure') &&
          !contains(needs.*.result, 'cancelled')))
    runs-on: base-2204-amd64
    steps:
      - run: exit 0
